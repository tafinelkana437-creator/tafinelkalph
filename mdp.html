<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mdp.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <h1>Générateur de mot de passe</h1>
        <div class="result-container">
            <input type="text" id="password-display" readonly placeholder="Votre mot de passe apparaît ici">
            <button id="copy-btn">Copier</button>
        </div>
    </div>
    <div class="options">
        <div class="option-item">
            <label for="length">Longueur du mot de passe:</label>
            <input type="number" id="length" min="6" max="25" value="12">
        </div>
        <div class="option-item">
            <input type="checkbox" id="include-uppercase" checked>
            <label for="include-uppercase">Inclure des majuscules</label>
        </div>
        <div class="option-item">
            <input type="checkbox" id="include-lowercase" checked>
            <label for="include-lowercase">Inclure des minuscules</label>
        </div>
        <div class="option-item">
            <input type="checkbox" id="include-numbers" checked>
            <label for="include-numbers">Inclure des chiffres</label>
        </div>
        <div class="option-item">
            <input type="checkbox" id="include-symbols" checked>
            <label for="include-symbols">Inclure des symboles</label>
        </div>
        <button id="generate-btn">Générer le mot de passe</button>
    </div>
    <script src="mdp.js"></script>
</body>
</html>
